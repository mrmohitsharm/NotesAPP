<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NotesApp Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#667eea,#764ba2);
    font-family:'Segoe UI',sans-serif;
}

.login-card{
    width:100%;
    max-width:450px;
    border:none;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 15px 40px rgba(0,0,0,0.2);
}

.logo-box{
    background:white;
    text-align:center;
    padding:30px 20px 10px;
}

.logo{
    font-size:50px;
}

.app-name{
    font-size:32px;
    font-weight:bold;
    color:#4f46e5;
}

.tagline{
    color:gray;
    font-size:14px;
}

.card-body{
    padding:35px;
}

.form-control{
    height:50px;
    border-radius:10px;
}

.btn-login{
    width:100%;
    height:50px;
    border:none;
    border-radius:10px;
    background:#4f46e5;
    color:white;
    font-weight:600;
    transition:0.3s;
}

.btn-login:hover{
    background:#4338ca;
}

.register-link{
    text-align:center;
    margin-top:20px;
}

.register-link a{
    text-decoration:none;
    font-weight:600;
}

@media(max-width:576px){

    .login-card{
        margin:15px;
    }

    .app-name{
        font-size:26px;
    }

}

</style>

</head>
<body>

<div class="card login-card">

    <div class="logo-box">

        <div class="logo">📝</div>

        <div class="app-name">
            NotesApp
        </div>

        <div class="tagline">
            Secure Notes • Anywhere • Anytime
        </div>

    </div>

    <div class="card-body">

        <h3 class="mb-4 text-center">
            Welcome Back
        </h3>

        <form method="POST">
            {% csrf_token %}

            <input
                type="text"
                name="username"
                class="form-control mb-3"
                placeholder="Enter Username"
                required>

            <input
                type="password"
                name="password"
                class="form-control mb-3"
                placeholder="Enter Password"
                required>

            <button class="btn-login">
                Login
            </button>

        </form>

        <div class="register-link">
            Don't have an account?
            <a href="/register/">
                Register Here
            </a>
        </div>

    </div>

</div>

</body>
</html>
