```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>User Profile</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background: #f4f7fc;
    font-family: 'Segoe UI', sans-serif;
}

.profile-card{
    max-width: 700px;
    margin: 50px auto;
    border: none;
    border-radius: 25px;
    overflow: hidden;
    box-shadow: 0 10px 35px rgba(0,0,0,0.1);
}

.profile-header{
    background: linear-gradient(135deg,#2563eb,#7c3aed);
    color: white;
    text-align: center;
    padding: 40px 20px;
}

.avatar{
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: rgba(255,255,255,.2);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: auto;
    font-size: 40px;
    margin-bottom: 15px;
}

.profile-body{
    padding: 30px;
}

.info-box{
    background: #f8f9fa;
    border-radius: 15px;
    padding: 15px;
    margin-bottom: 15px;
}

.info-label{
    font-weight: 600;
    color: #6c757d;
    margin-bottom: 5px;
}

.info-value{
    font-size: 18px;
    font-weight: 500;
}

.stats-card{
    background: linear-gradient(135deg,#10b981,#059669);
    color: white;
    border-radius: 15px;
    padding: 20px;
    text-align: center;
    margin-top: 15px;
}

.stats-card h2{
    margin: 0;
    font-weight: bold;
}

.back-btn{
    border-radius: 12px;
    padding: 10px 25px;
}

@media(max-width:768px){

    .profile-card{
        margin:20px;
    }

    .profile-header{
        padding:30px 15px;
    }

    .profile-body{
        padding:20px;
    }
}

</style>

</head>
<body>

<div class="card profile-card">

    <div class="profile-header">

        <div class="avatar">
            👤
        </div>

        <h2>{{ username }}</h2>

        <p class="mb-0">
            NotesHub User
        </p>

    </div>

    <div class="profile-body">

        <div class="info-box">

            <div class="info-label">
                📧 Email
            </div>

            <div class="info-value">
                {{ email|default:"Not Added" }}
            </div>

        </div>

        <div class="info-box">

            <div class="info-label">
                📅 Joined On
            </div>

            <div class="info-value">
                {{ date_joined }}
            </div>

        </div>

        <div class="stats-card">

            <h2>{{ total_notes }}</h2>

            <p class="mb-0">
                Total Notes Created
            </p>

        </div>

        <div class="text-center mt-4">

            <a href="/" class="btn btn-primary back-btn">
                📝 Back To Notes
            </a>

        </div>

    </div>

</div>

</body>
</html>
```
