<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register | NotesHub</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    font-family:'Segoe UI',sans-serif;
}

.register-card{
    width:100%;
    max-width:450px;
    background:white;
    border:none;
    border-radius:20px;
    padding:35px;
    box-shadow:0 15px 35px rgba(0,0,0,0.15);
}

.logo{
    font-size:55px;
    text-align:center;
}

.title{
    text-align:center;
    font-weight:700;
    margin-top:10px;
}

.subtitle{
    text-align:center;
    color:gray;
    margin-bottom:25px;
}

.form-control{
    height:50px;
    border-radius:12px;
}

.btn-register{
    width:100%;
    height:50px;
    border-radius:12px;
    font-weight:600;
}

.login-link{
    text-align:center;
    margin-top:20px;
}

.login-link a{
    text-decoration:none;
    font-weight:600;
}

@media(max-width:576px){

    body{
        padding:15px;
    }

    .register-card{
        padding:25px;
    }

    .logo{
        font-size:45px;
    }

    .title{
        font-size:28px;
    }
}

</style>

</head>
<body>

<div class="register-card">

    <div class="logo">
        📝
    </div>

    <h2 class="title">
        NotesHub
    </h2>

    <p class="subtitle">
        Create your account to manage notes securely
    </p>

    {% if messages %}
    {% for message in messages %}
        <div class="alert alert-danger">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}
    <form method="POST">

        {% csrf_token %}

        <div class="mb-3">

            <label class="form-label">
                Username
            </label>

            <input
                type="text"
                name="username"
                class="form-control"
                placeholder="Enter username"
                required>

        </div>
<div class="mb-3">

    <label class="form-label">
        Email
    </label>

    <input
        type="email"
        name="email"
        class="form-control"
        placeholder="Enter email"
        required>

</div>
        <div class="mb-3">

            <label class="form-label">
                Password
            </label>

            <input
                type="password"
                name="password"
                class="form-control"
                placeholder="Enter password"
                required>

        </div>

        <button class="btn btn-primary btn-register">
            Create Account
        </button>

    </form>

    <div class="login-link">

        Already have an account?

        <a href="/login/">
            Login Here
        </a>

    </div>

</div>

</body>
</html>
