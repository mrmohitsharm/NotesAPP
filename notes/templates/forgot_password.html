<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forgot Password | NotesHub</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    font-family:'Segoe UI',sans-serif;
}

.forgot-card{
    width:100%;
    max-width:450px;
    background:white;
    border-radius:20px;
    padding:35px;
    box-shadow:0 15px 35px rgba(0,0,0,.15);
}

.logo{
    text-align:center;
    font-size:60px;
}

.title{
    text-align:center;
    font-weight:700;
    margin-top:10px;
}

.subtitle{
    text-align:center;
    color:#6c757d;
    margin-bottom:25px;
}

.form-control{
    height:50px;
    border-radius:12px;
}

.btn-send{
    width:100%;
    height:50px;
    border-radius:12px;
    font-weight:600;
}

.back-link{
    text-align:center;
    margin-top:20px;
}

.back-link a{
    text-decoration:none;
    font-weight:600;
}

</style>

</head>
<body>

<div class="forgot-card">

```
<div class="logo">
    🔑
</div>

<h2 class="title">
    Forgot Password
</h2>

<p class="subtitle">
    Enter your registered email to receive an OTP
</p>

{% if error %}
<div class="alert alert-danger">
    {{ error }}
</div>
{% endif %}

<form method="POST">

    {% csrf_token %}

    <div class="mb-3">

        <label class="form-label">
            Email Address
        </label>

        <input
            type="email"
            name="email"
            class="form-control"
            placeholder="Enter your email"
            required>

    </div>

    <button class="btn btn-primary btn-send">
        Send OTP
    </button>

</form>

<div class="back-link">

    <a href="/login/">
        ← Back to Login
    </a>

</div>
```

</div>

</body>
</html>
