<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reset Password | NotesHub</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    font-family:'Segoe UI',sans-serif;
}

.reset-card{
    width:100%;
    max-width:450px;
    background:white;
    border-radius:20px;
    padding:35px;
    box-shadow:0 15px 35px rgba(0,0,0,.15);
}

.logo{
    text-align:center;
    font-size:60px;
}

.title{
    text-align:center;
    font-weight:700;
    margin-top:10px;
}

.subtitle{
    text-align:center;
    color:#6c757d;
    margin-bottom:25px;
}

.form-control{
    height:50px;
    border-radius:12px;
}

.btn-reset{
    width:100%;
    height:50px;
    border-radius:12px;
    font-weight:600;
}

</style>

</head>
<body>

<div class="reset-card">

<div class="logo">
    🔒
</div>

<h2 class="title">
    Reset Password
</h2>

<p class="subtitle">
    Enter your new password
</p>

<form method="POST">

    {% csrf_token %}

    <input
        type="password"
        name="password"
        class="form-control mb-3"
        placeholder="New Password"
        required>

    <button class="btn btn-success btn-reset">
        Update Password
    </button>

</form>

</div>

</body>
</html>
