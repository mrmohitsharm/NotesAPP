<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Verify OTP | NotesHub</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    font-family:'Segoe UI',sans-serif;
}

.otp-card{
    width:100%;
    max-width:450px;
    background:white;
    border-radius:20px;
    padding:35px;
    box-shadow:0 15px 35px rgba(0,0,0,.15);
}

.logo{
    text-align:center;
    font-size:60px;
}

.title{
    text-align:center;
    font-weight:700;
    margin-top:10px;
}

.subtitle{
    text-align:center;
    color:#6c757d;
    margin-bottom:25px;
}

.form-control{
    height:55px;
    border-radius:12px;
    text-align:center;
    font-size:20px;
    letter-spacing:4px;
}

.btn-verify{
    width:100%;
    height:50px;
    border-radius:12px;
    font-weight:600;
}

.back-link{
    text-align:center;
    margin-top:20px;
}

.back-link a{
    text-decoration:none;
    font-weight:600;
}

</style>

</head>
<body>

<div class="otp-card">

```
<div class="logo">
    🔐
</div>

<h2 class="title">
    Verify OTP
</h2>

<p class="subtitle">
    Enter the 6-digit OTP sent to your email
</p>

{% if error %}
<div class="alert alert-danger">
    {{ error }}
</div>
{% endif %}

{% if messages %}
    {% for message in messages %}
    <div class="alert alert-warning">
        {{ message }}
    </div>
    {% endfor %}
{% endif %}

<form method="POST">
    {% csrf_token %}

    <input
        type="text"
        name="otp"
        maxlength="6"
        class="form-control mb-3"
        placeholder="000000"
        required>

    <button class="btn btn-primary btn-verify">
        Verify OTP
    </button>

</form>

<div class="back-link">
    <a href="/register/">
        ← Back to Register
    </a>
</div>
```

</div>

</body>
</html>
