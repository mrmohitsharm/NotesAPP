<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Verify Login OTP | NotesApp</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#667eea,#764ba2);
    font-family:'Segoe UI',sans-serif;
}

.login-card{
    width:100%;
    max-width:450px;
    border:none;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 15px 40px rgba(0,0,0,0.2);
}

.logo-box{
    background:white;
    text-align:center;
    padding:30px 20px 10px;
}

.logo{
    font-size:50px;
}

.app-name{
    font-size:32px;
    font-weight:bold;
    color:#4f46e5;
}

.tagline{
    color:gray;
    font-size:14px;
}

.card-body{
    padding:35px;
}

.form-control{
    height:55px;
    border-radius:10px;
    text-align:center;
    font-size:20px;
    letter-spacing:4px;
}

.btn-login{
    width:100%;
    height:50px;
    border:none;
    border-radius:10px;
    background:#4f46e5;
    color:white;
    font-weight:600;
}

.btn-login:hover{
    background:#4338ca;
}

.links{
    text-align:center;
    margin-top:20px;
}

.links a{
    text-decoration:none;
    font-weight:600;
}

.error-box{
    background:#ffe5e5;
    color:red;
    padding:10px;
    border-radius:8px;
    margin-bottom:15px;
}

</style>

</head>
<body>

<div class="card login-card">

    <div class="logo-box">

        <div class="logo">📝</div>

        <div class="app-name">
            NotesApp
        </div>

        <div class="tagline">
            Secure Notes • Anywhere • Anytime
        </div>

    </div>

    <div class="card-body">

        <h3 class="text-center mb-2">
            Verify Login OTP
        </h3>

        <p class="text-center text-muted mb-4">
            Enter the 6-digit OTP sent to your email
        </p>

        {% if error %}
        <div class="error-box">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="{% url 'verify_login_otp' %}">

            {% csrf_token %}

            <input
                type="text"
                name="otp"
                maxlength="6"
                class="form-control mb-3"
                placeholder="000000"
                required>

            <button class="btn-login">
                Verify OTP
            </button>

        </form>

        <div class="links">
            <a href="/login/">
                ← Back to Login
            </a>
        </div>

    </div>

</div>

</body>
</html>
